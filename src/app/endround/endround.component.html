<div class="endround">
    <div class="endround-box">
        <div class="win-side">
            <img class="win-side-image" src="{{match.teams[0].teamUrl}}" />
            <div class= "win-side-text">{{match.teams[0].isAttacking ? "ATTACKER" : "DEFENDER"}} WIN</div>
        </div>
        <div class="info-box">
            <img class="info-image" src="../../assets/misc/logo.webp"/>
            <div class="round-number">ROUND {{match.roundNumber}}</div>
        </div>
    </div>
</div>
